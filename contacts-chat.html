<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ConnectMe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #1a1917;
    --surface2: #242220;
    --border: #2e2c29;
    --accent: #e8c547;
    --accent2: #e87d47;
    --text: #f0ece4;
    --text-muted: #7a7670;
    --text-dim: #4a4844;
    --green: #5dba6f;
    --red: #e05555;
    --blue: #5599e8;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.03em;
    color: var(--accent);
  }
  header h1 span { font-style: italic; color: var(--text); }

  /* ── My Code Badge ── */
  #my-code-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
  }
  #my-code-bar .label { color: var(--text-muted); font-size: 0.7rem; }
  #my-code-val { color: var(--accent); font-size: 1rem; font-weight: 500; letter-spacing: 0.1em; }
  #share-btn {
    background: var(--accent);
    color: #000;
    border: none; cursor: pointer;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.72rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }
  #share-btn:hover { opacity: 0.85; }

  /* ── Layout ── */
  main { max-width: 700px; margin: 0 auto; padding: 20px 16px 120px; }

  /* ── Add Contact Form ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 140px; }
  .form-group label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-dim); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; cursor: pointer;
    border-radius: 7px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; transition: opacity 0.15s, transform 0.1s;
    text-decoration: none;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; padding: 10px 18px; font-size: 0.88rem; }
  .btn-sm { padding: 6px 10px; font-size: 0.78rem; }
  .btn-text  { background: rgba(232,197,71,0.12); color: var(--accent); }
  .btn-email { background: rgba(85,153,232,0.12); color: var(--blue); }
  .btn-call  { background: rgba(93,186,111,0.12); color: var(--green); }
  .btn-delete{ background: rgba(224,85,85,0.12); color: var(--red); }
  .btn-video { background: rgba(232,125,71,0.15); color: var(--accent2); }

  /* ── Contact List ── */
  #contact-list { display: flex; flex-direction: column; gap: 10px; }
  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem; color: #000; flex-shrink: 0;
  }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-weight: 600; font-size: 0.95rem; }
  .contact-details { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-size: 0.9rem;
  }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 8px; }

  /* ── Call Modal ── */
  #call-modal {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    align-items: flex-end; justify-content: center;
    padding: 0 0 0 0;
  }
  #call-modal.open { display: flex; }

  #call-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 700px;
    padding: 20px 20px 30px;
    animation: slideUp 0.3s ease;
    max-height: 92vh;
    overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity:0; } to { transform: none; opacity:1; } }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem; color: var(--accent);
  }
  #close-call {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  #close-call:hover { color: var(--red); }

  /* Video area */
  #videos-wrap {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .vid-box {
    position: relative;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    flex: 1; min-width: 120px;
  }
  .vid-box video {
    width: 100%; height: 120px; object-fit: cover; display: block;
  }
  .vid-label {
    position: absolute; bottom: 4px; left: 6px;
    background: rgba(0,0,0,0.6); border-radius: 4px;
    font-size: 0.65rem; padding: 2px 5px; color: #fff;
  }
  #remote-vid-box { flex: 2; }
  #remote-vid-box video { height: 180px; }

  /* Connect bar */
  .connect-row {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 14px;
  }
  .connect-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem; letter-spacing: 0.12em;
    padding: 9px 12px; outline: none;
    text-transform: uppercase;
    transition: border-color 0.15s;
  }
  .connect-row input:focus { border-color: var(--accent); }

  /* Status */
  #call-status {
    font-size: 0.78rem; color: var(--text-muted);
    margin-bottom: 12px; font-family: 'DM Mono', monospace;
    min-height: 18px;
  }
  #call-status.ok { color: var(--green); }
  #call-status.err { color: var(--red); }

  /* Chat */
  #chat-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px;
    height: 140px;
    overflow-y: auto;
    font-size: 0.82rem;
    margin-bottom: 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .msg { padding: 4px 8px; border-radius: 6px; max-width: 80%; word-break: break-word; }
  .msg.me { background: rgba(232,197,71,0.15); color: var(--accent); align-self: flex-end; }
  .msg.them { background: var(--border); color: var(--text); align-self: flex-start; }
  .msg .who { font-size: 0.65rem; opacity: 0.6; margin-bottom: 1px; }

  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; padding: 8px 12px; outline: none;
    transition: border-color 0.15s;
  }
  .chat-input-row input:focus { border-color: var(--accent); }

  /* Photo share */
  #photo-section { margin-top: 12px; }
  .photo-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  #photo-preview-wrap {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
  }
  .shared-photo {
    width: 80px; height: 80px; object-fit: cover;
    border-radius: 7px; border: 1px solid var(--border);
    cursor: pointer;
  }
  .photo-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Call controls */
  #call-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .ctrl-btn {
    flex: 1; min-width: 80px;
    padding: 10px 6px;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .ctrl-btn:hover { opacity: 0.85; }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn .icon { font-size: 1.1rem; }
  .ctrl-btn.red { background: var(--red); color: #fff; }
  .ctrl-btn.muted { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .ctrl-btn.active-ctrl { background: rgba(93,186,111,0.2); color: var(--green); border: 1px solid rgba(93,186,111,0.3); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    font-size: 0.82rem; color: var(--text);
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 500;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* Search */
  #search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    padding: 10px 14px; outline: none; margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text-dim); }

  @media (max-width: 420px) {
    .contact-actions { gap: 4px; }
    .btn-sm { padding: 5px 8px; font-size: 0.72rem; }
    #remote-vid-box video { height: 140px; }
  }
</style>
</head>
<body>

<header>
  <h1>Connect<span>Me</span></h1>
  <div id="my-code-bar">
    <div>
      <div class="label">YOUR CODE</div>
      <div id="my-code-val">····</div>
    </div>
    <button id="share-btn" onclick="shareMyCode()">⬆ Share</button>
  </div>
</header>

<main>
  <!-- Add Contact -->
  <div class="card">
    <div class="card-title">Add Contact</div>
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input id="inp-name" type="text" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input id="inp-phone" type="tel" placeholder="+1 555 000 1234">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="inp-email" type="email" placeholder="jane@example.com">
      </div>
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" onclick="addContact()">+ Add Contact</button>
    </div>
  </div>

  <!-- Search -->
  <input id="search-input" type="search" placeholder="🔍  Search contacts…" oninput="renderContacts()">

  <!-- List -->
  <div id="contact-list"></div>
</main>

<!-- Call Modal -->
<div id="call-modal">
  <div id="call-panel">
    <div class="panel-header">
      <div class="panel-title">Live Call</div>
      <button id="close-call" onclick="closeCall()">✕</button>
    </div>

    <div id="videos-wrap">
      <div class="vid-box" id="local-vid-box">
        <video id="local-video" autoplay muted playsinline></video>
        <div class="vid-label">You</div>
      </div>
      <div class="vid-box" id="remote-vid-box">
        <video id="remote-video" autoplay playsinline></video>
        <div class="vid-label">Them</div>
      </div>
    </div>

    <div id="call-status">Initializing…</div>

    <div class="connect-row">
      <input id="peer-code-inp" maxlength="4" placeholder="ENTER CODE" oninput="this.value=this.value.toUpperCase()">
      <button class="btn btn-primary" onclick="connectToPeer()">Connect</button>
    </div>

    <!-- Chat -->
    <div id="chat-area"></div>
    <div class="chat-input-row">
      <input id="chat-inp" type="text" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendChat()">
      <button class="btn btn-primary btn-sm" onclick="sendChat()">Send</button>
    </div>

    <!-- Photo share -->
    <div id="photo-section">
      <div class="photo-row">
        <span class="photo-label">📷 Photos</span>
        <label class="btn btn-sm btn-email" style="cursor:pointer;">
          Choose Photo
          <input type="file" accept="image/*" multiple style="display:none" onchange="handlePhotoSelect(event)">
        </label>
      </div>
      <div id="photo-preview-wrap"></div>
    </div>

    <!-- Controls -->
    <div id="call-controls">
      <button class="ctrl-btn active-ctrl" id="btn-mic" onclick="toggleMic()">
        <span class="icon">🎙️</span><span>Mute</span>
      </button>
      <button class="ctrl-btn active-ctrl" id="btn-cam" onclick="toggleCam()">
        <span class="icon">📷</span><span>Cam off</span>
      </button>
      <button class="ctrl-btn red" onclick="closeCall()">
        <span class="icon">📵</span><span>End</span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
let myCode = '';
let peer = null;
let currentConn = null;
let currentCall = null;
let localStream = null;
let micEnabled = true;
let camEnabled = true;

// ── PeerJS Init ────────────────────────────────────────────────
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function initPeer(code) {
  myCode = code || genCode();
  document.getElementById('my-code-val').textContent = myCode;

  peer = new Peer(myCode, { debug: 1 });

  peer.on('open', id => {
    setStatus(`Ready · Your code: ${id}`, 'ok');
    checkAutoConnect();
  });

  peer.on('connection', conn => {
    setupDataConn(conn);
    setStatus(`${conn.peer} connected!`, 'ok');
    showToast(`📡 ${conn.peer} joined`);
  });

  peer.on('call', call => {
    currentCall = call;
    getMedia().then(stream => {
      call.answer(stream);
      call.on('stream', remoteStream => {
        document.getElementById('remote-video').srcObject = remoteStream;
      });
    });
    openCallPanel();
    setStatus(`Call from ${call.peer}`, 'ok');
  });

  peer.on('error', e => {
    setStatus('Error: ' + e.type, 'err');
    // regenerate on ID-taken
    if (e.type === 'unavailable-id') {
      peer.destroy(); initPeer();
    }
  });
}

function checkAutoConnect() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code && code.toUpperCase() !== myCode) {
    document.getElementById('peer-code-inp').value = code.toUpperCase();
    openCallPanel();
    setTimeout(() => connectToPeer(), 800);
  }
}

// ── Media ──────────────────────────────────────────────────────
async function getMedia() {
  if (localStream) return localStream;
  localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width:320, height:240 }, audio: true });
  document.getElementById('local-video').srcObject = localStream;
  return localStream;
}

// ── Data Connection ────────────────────────────────────────────
function setupDataConn(conn) {
  currentConn = conn;
  conn.on('data', data => {
    if (data.type === 'chat') appendChat(data.text, 'them', conn.peer);
    if (data.type === 'photo') receivePhoto(data.src, conn.peer);
  });
  conn.on('close', () => setStatus('Connection closed', 'err'));
}

function connectToPeer() {
  const code = document.getElementById('peer-code-inp').value.trim().toUpperCase();
  if (!code || code.length !== 4) { showToast('Enter a 4-character code'); return; }
  if (!peer || !peer.open) { showToast('Not ready yet, try again'); return; }

  setStatus(`Connecting to ${code}…`);
  const conn = peer.connect(code);
  conn.on('open', () => {
    setupDataConn(conn);
    setStatus(`Connected to ${code}`, 'ok');
    showToast(`✅ Connected to ${code}`);
    // Start video call
    getMedia().then(stream => {
      const call = peer.call(code, stream);
      currentCall = call;
      call.on('stream', remoteStream => {
        document.getElementById('remote-video').srcObject = remoteStream;
      });
    });
  });
  conn.on('error', e => setStatus('Connect failed: ' + e, 'err'));
}

// ── Chat ───────────────────────────────────────────────────────
function sendChat() {
  const inp = document.getElementById('chat-inp');
  const text = inp.value.trim();
  if (!text) return;
  if (currentConn && currentConn.open) {
    currentConn.send({ type: 'chat', text });
    appendChat(text, 'me', 'You');
  } else {
    showToast('Not connected to anyone yet');
  }
  inp.value = '';
}

function appendChat(text, who, label) {
  const area = document.getElementById('chat-area');
  const d = document.createElement('div');
  d.className = `msg ${who}`;
  d.innerHTML = `<div class="who">${label}</div>${escHtml(text)}`;
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

// ── Photos ─────────────────────────────────────────────────────
function handlePhotoSelect(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const src = ev.target.result;
      addPhotoPreview(src, 'You');
      if (currentConn && currentConn.open) {
        currentConn.send({ type: 'photo', src });
      }
    };
    reader.readAsDataURL(file);
  });
}

function receivePhoto(src, from) {
  addPhotoPreview(src, from);
  showToast(`📸 Photo from ${from}`);
}

function addPhotoPreview(src, from) {
  const wrap = document.getElementById('photo-preview-wrap');
  const img = document.createElement('img');
  img.src = src;
  img.className = 'shared-photo';
  img.title = `From: ${from}`;
  img.onclick = () => window.open(src, '_blank');
  wrap.prepend(img);
}

// ── Controls ───────────────────────────────────────────────────
function toggleMic() {
  if (!localStream) return;
  micEnabled = !micEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  const btn = document.getElementById('btn-mic');
  btn.className = `ctrl-btn ${micEnabled ? 'active-ctrl' : 'muted'}`;
  btn.querySelector('span.icon').textContent = micEnabled ? '🎙️' : '🔇';
  btn.querySelector('span:last-child').textContent = micEnabled ? 'Mute' : 'Unmuted';
}

function toggleCam() {
  if (!localStream) return;
  camEnabled = !camEnabled;
  localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
  const btn = document.getElementById('btn-cam');
  btn.className = `ctrl-btn ${camEnabled ? 'active-ctrl' : 'muted'}`;
  btn.querySelector('span.icon').textContent = camEnabled ? '📷' : '🚫';
  btn.querySelector('span:last-child').textContent = camEnabled ? 'Cam off' : 'Cam on';
}

// ── Call Panel ─────────────────────────────────────────────────
function openCallPanel(contactName) {
  document.getElementById('call-modal').classList.add('open');
  getMedia().catch(e => setStatus('Camera/mic denied: ' + e.message, 'err'));
}

function closeCall() {
  document.getElementById('call-modal').classList.remove('open');
  if (currentCall) { currentCall.close(); currentCall = null; }
  if (currentConn) { currentConn.close(); currentConn = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('local-video').srcObject = null;
  document.getElementById('remote-video').srcObject = null;
  document.getElementById('photo-preview-wrap').innerHTML = '';
  document.getElementById('chat-area').innerHTML = '';
  setStatus('Initializing…');
}

// ── Contacts ───────────────────────────────────────────────────
function saveContacts() { localStorage.setItem('contacts', JSON.stringify(contacts)); }

function addContact() {
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name) { showToast('Name is required'); return; }
  contacts.unshift({ id: Date.now(), name, phone, email });
  saveContacts(); renderContacts();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-phone').value = '';
  document.getElementById('inp-email').value = '';
  showToast('✅ Contact added');
}

function deleteContact(id) {
  contacts = contacts.filter(c => c.id !== id);
  saveContacts(); renderContacts();
}

function renderContacts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = contacts.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.phone && c.phone.includes(q)) ||
    (c.email && c.email.toLowerCase().includes(q))
  );
  const list = document.getElementById('contact-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">📭</div>${contacts.length ? 'No matches' : 'No contacts yet — add one above'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const phoneBtn = c.phone
      ? `<a class="btn btn-sm btn-text" href="sms:${encodeURIComponent(c.phone)}">💬 Text</a>`
      : '';
    const emailBtn = c.email
      ? `<a class="btn btn-sm btn-email" href="mailto:${encodeURIComponent(c.email)}">✉️ Email</a>`
      : '';
    return `
      <div class="contact-card">
        <div class="avatar">${initials}</div>
        <div class="contact-info">
          <div class="contact-name">${escHtml(c.name)}</div>
          <div class="contact-details">${[c.phone, c.email].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="contact-actions">
          ${phoneBtn}
          ${emailBtn}
          <button class="btn btn-sm btn-video" onclick="startVideoWith('${escHtml(c.name)}')">📹 Call</button>
          <button class="btn btn-sm btn-delete" onclick="deleteContact(${c.id})">🗑</button>
        </div>
      </div>`;
  }).join('');
}

function startVideoWith(name) {
  openCallPanel(name);
  showToast(`Ask ${name} to enter your code: ${myCode}`);
}

// ── Share ──────────────────────────────────────────────────────
function shareMyCode() {
  const url = `${location.origin}${location.pathname}?code=${myCode}`;
  if (navigator.share) {
    navigator.share({ title: 'ConnectMe Call', text: `Join my call! Code: ${myCode}`, url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied!'));
  } else {
    prompt('Copy this link:', url);
  }
}

// ── Helpers ────────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('call-status');
  el.textContent = msg;
  el.className = cls || '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────
initPeer();
renderContacts();
</script>
</body>
</html>
